<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FLOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4 overflow-hidden relative">
    <!-- Background Accents -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-100 rounded-full blur-[100px] opacity-50"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-orange-100 rounded-full blur-[100px] opacity-50"></div>

    <div class="max-w-md w-full glass rounded-3xl shadow-2xl p-10 z-10">
        <div class="text-center mb-10">
            <div class="flex justify-center items-center mb-4">
                <span class="text-3xl font-bold text-orange-500 tracking-tight">Shuu</span><span class="text-3xl font-bold text-gray-900 tracking-tight">Fare</span>
            </div>
            <h1 class="text-xl font-bold text-gray-900">Sign in to FLOS</h1>
            <p class="text-sm text-gray-500 mt-2">Fleet Operations & Settlement Management</p>
        </div>

        {% if request.query_params.get('error') %}
        <div class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm rounded-md">
            {{ request.query_params.get('error') }}
        </div>
        {% endif %}

        <!-- Password Login Form -->
        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Email Address</label>
                <input type="email" name="email" required class="block w-full px-4 py-3 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-all outline-none text-slate-800" placeholder="name@company.com">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Password</label>
                <input type="password" name="password" required class="block w-full px-4 py-3 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-all outline-none text-slate-800" placeholder="••••••••">
            </div>
            <div class="flex items-center justify-between">
                <label class="flex items-center text-sm text-gray-500 cursor-pointer select-none">
                    <input type="checkbox" class="rounded border-gray-300 text-orange-500 focus:ring-orange-500 mr-2">
                    Remember me
                </label>
                <a href="#" class="text-sm text-orange-600 hover:underline font-medium">Forgot password?</a>
            </div>
            <button type="submit" class="w-full bg-gray-900 hover:bg-black text-white font-bold py-3 rounded-xl shadow-lg transform transition-all active:scale-[0.98]">
                Sign In
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-gray-100 text-center">
            <p class="text-xs text-gray-400">&copy; 2026 G2G IT Solutions. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
