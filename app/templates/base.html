<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FLOS - Telebirr Verification{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .nav-link { color: #6b7280; font-weight: 500; padding: 0.5rem 1rem; border-radius: 0.375rem; transition: color 0.2s; }
        .nav-link:hover { color: #111827; }
        .nav-link.active { color: #2563eb; font-weight: 600; }
    </style>
</head>
<body class="text-gray-800">
    <!-- Top Navigation -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo & Nav -->
                <div class="flex items-center space-x-8">
                    <!-- Logo -->
                    <div class="flex-shrink-0 flex items-center cursor-pointer">
                        <span class="text-2xl font-bold text-orange-500 tracking-tight">Shuu</span><span class="text-2xl font-bold text-gray-900 tracking-tight">Fare</span>
                        <span class="ml-2 text-xs font-semibold bg-gray-100 text-gray-600 px-2 py-0.5 rounded uppercase">FLOS</span>
                    </div>
                    
                    <!-- Links -->
                    <nav class="hidden md:flex space-x-2">
                        <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
                        <a href="/orders" class="nav-link {% if request.url.path == '/orders' %}active{% endif %}">Orders</a>
                        <a href="/exceptions" class="nav-link {% if request.url.path == '/exceptions' %}active{% endif %}">Exceptions</a>
                        <a href="/internal-drivers" class="nav-link {% if request.url.path == '/internal-drivers' %}active{% endif %}">Internal Drivers</a>
                        <a href="/simulator" class="nav-link {% if request.url.path == '/simulator' %}active{% endif %}">Simulator</a>
                    </nav>
                </div>

                <!-- Right Side (Profile / Notifications) -->
                <div class="flex items-center space-x-6">
                    <!-- Notification Bell -->
                    <div class="relative cursor-pointer text-gray-500 hover:text-gray-700">
                        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                        </svg>
                        <!-- Badge -->
                        <span class="absolute -top-1 -right-1 flex h-4 w-4 items-center justify-center rounded-full bg-red-600 text-[10px] font-bold text-white ring-2 ring-white">3</span>
                    </div>
                    
                    <!-- Profile Dropdown -->
                    <div class="flex items-center space-x-3 cursor-pointer">
                        <div class="h-8 w-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-sm">
                            OM
                        </div>
                        <span class="text-sm font-medium text-gray-700">Operations Manager</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
