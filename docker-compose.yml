# ─────────────────────────────────────────────────────────────────────────────
#  FLOS — Fleet Operations System
#  Docker Compose — Production Stack
#
#  Services:  db (PostgreSQL 15)  |  web (FastAPI/uvicorn)  |  caddy (reverse proxy)
#
#  Required .env variables:
#    POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#    SECRET_KEY        (JWT signing secret — use a long random string in prod)
#    YANGO_BASE_URL, YANGO_API_KEY, YANGO_CLIENT_ID, YANGO_PARK_ID
#    PLAYSMS_URL, PLAYSMS_USER, PLAYSMS_TOKEN   (optional SMS gateway)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: flos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flos-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── FastAPI Application ────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: flos-web:latest
    container_name: flos-web
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      # ── Database (uses internal Docker network hostname "db") ──
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}

      # ── Application ──
      APP_NAME:   ${APP_NAME:-FLOS Fleet Management}
      DEBUG:      ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      SEED_DB:    ${SEED_DB:-false}

      # ── Yango Fleet API ──
      YANGO_BASE_URL:   ${YANGO_BASE_URL}
      YANGO_API_KEY:    ${YANGO_API_KEY}
      YANGO_CLIENT_ID:  ${YANGO_CLIENT_ID}
      YANGO_PARK_ID:    ${YANGO_PARK_ID}

      # ── SMS Gateway (optional) ──
      PLAYSMS_URL:   ${PLAYSMS_URL:-}
      PLAYSMS_USER:  ${PLAYSMS_USER:-}
      PLAYSMS_TOKEN: ${PLAYSMS_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - flos-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/docs || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Caddy Reverse Proxy ────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: flos-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    networks:
      - flos-net

# ── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  caddy_data:
  caddy_config:

# ── Isolated Bridge Network ──────────────────────────────────────────────────
networks:
  flos-net:
    driver: bridge
