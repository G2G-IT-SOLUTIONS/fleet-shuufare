services:
  db:
    image: postgres:15-alpine
    container_name: flos-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: flos-web
    restart: always
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - APP_NAME=${APP_NAME:-G2G Fleet Management}
      - DEBUG=${DEBUG:-False}
      - SEED_DB=${SEED_DB:-false}
      - YANGO_BASE_URL=${YANGO_BASE_URL}
      - YANGO_API_KEY=${YANGO_API_KEY}
      - YANGO_CLIENT_ID=${YANGO_CLIENT_ID}
      - YANGO_PARK_ID=${YANGO_PARK_ID}
      - PLAYSMS_URL=${PLAYSMS_URL}
      - PLAYSMS_USER=${PLAYSMS_USER}
      - PLAYSMS_TOKEN=${PLAYSMS_TOKEN}
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: flos-caddy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
