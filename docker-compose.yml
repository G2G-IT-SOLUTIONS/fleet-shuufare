# ─────────────────────────────────────────────────────────────────────────────
#  FLOS — Fleet Operations System
#  Docker Compose — Production Stack
#
#  Services:  db (PostgreSQL 15)  |  web (FastAPI/uvicorn)  |  caddy (reverse proxy)
#
#  Required .env variables:
#    POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#    SECRET_KEY        (JWT signing secret — use a long random string in prod)
#    YANGO_BASE_URL, YANGO_API_KEY, YANGO_CLIENT_ID, YANGO_PARK_ID
#    PLAYSMS_URL, PLAYSMS_USER, PLAYSMS_TOKEN   (optional SMS gateway)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: flos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    ports:
      # Expose DB to host on localhost only. 
      # You can connect DataGrip to localhost:5432
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flos-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── FastAPI Application ────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: flos-web:latest
    container_name: flos-web
    restart: unless-stopped
    ports:
      # Bind only to localhost so only the shared Caddy on this host can reach it.
      # The external Caddy proxies flos.shuufare.com → 127.0.0.1:8000
      - "127.0.0.1:8000:8000"
    environment:
      # ── Database (uses internal Docker network hostname "db") ──
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}

      # ── Application ──
      APP_NAME:   ${APP_NAME:-FLOS Fleet Management}
      DEBUG:      ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      SEED_DB:    ${SEED_DB:-false}

      # ── Yango Fleet API ──
      YANGO_BASE_URL:   ${YANGO_BASE_URL}
      YANGO_API_KEY:    ${YANGO_API_KEY}
      YANGO_CLIENT_ID:  ${YANGO_CLIENT_ID}
      YANGO_PARK_ID:    ${YANGO_PARK_ID}

      # ── SMS Gateway (optional) ──
      PLAYSMS_URL:   ${PLAYSMS_URL:-}
      PLAYSMS_USER:  ${PLAYSMS_USER:-}
      PLAYSMS_TOKEN: ${PLAYSMS_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - flos-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/docs || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # NOTE: No bundled Caddy — the server's shared Caddy instance handles
  # TLS termination and reverse proxying for flos.shuufare.com → 127.0.0.1:8000
  # See Caddyfile.snippet for the block to add to the shared Caddyfile.

# ── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_data:

# ── Isolated Bridge Network ──────────────────────────────────────────────────
networks:
  flos-net:
    driver: bridge
